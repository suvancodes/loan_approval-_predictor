<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loan Eligibility - Input</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* Page */
    :root{
      --bg-dark-1: #051028;
      --bg-dark-2: #071033;
      --card-bg: rgba(255,255,255,0.06);
      --input-bg: #ffffff;
      --input-text: #052034;
      --muted-white: rgba(255,255,255,0.9);
      --accent: linear-gradient(90deg,#06b6d4,#4f46e5);
    }
    html,body{height:100%}
    body{
      margin:0;
      min-height:100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      color:var(--muted-white);
      font-family: system-ui, -apple-system, Roboto, Arial, sans-serif;
      padding-top:72px;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Topbar */
    .topbar{
      position:fixed; top:0; left:0; right:0; z-index:1030;
      background: rgba(2,6,23,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(4px);
    }
    .navbar-brand{ color:#fff !important; font-weight:700; }

    /* Card */
    .card{
      background: rgba(255,255,255,0.95);
      border: none;
      border-radius:20px;
      color: #333;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* Form labels and helpers */
    label, .form-label { color: #333 !important; font-weight:600; }
    .muted { color: rgba(0,0,0,0.7); }

    /* Inputs: strong contrast */
    .form-control, .form-select {
      background: var(--input-bg) !important;
      color: var(--input-text) !important;
      border: 2px solid rgba(0,0,0,0.08);
      height:44px;
      box-shadow: none;
      border-radius: 10px;
    }
    .form-control::placeholder { color: rgba(5,32,52,0.45) !important; }

    /* selects options readably */
    .form-select option { color: var(--input-text); background: var(--input-bg); }

    /* Focus */
    .form-control:focus, .form-select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: #fff;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      font-weight: 600;
      padding: 12px 30px;
      border-radius: 10px;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    /* Result */
    .result-badge { font-size:1.05rem; padding:.45rem .9rem; border-radius:10px; display:inline-flex; gap:.5rem; align-items:center; }
    .approved { background: linear-gradient(90deg,#16a34a,#4ade80); color:#04220b; }
    .rejected { background: linear-gradient(90deg,#dc2626,#f97316); color:#3a0b00; }

    /* Progress bars */
    .prob-bar { height:16px; border-radius:8px; }
    .approve-bar { background: linear-gradient(90deg,#10b981,#34d399); }
    .reject-bar { background: linear-gradient(90deg,#ef4444,#fb923c); }
    .progress { background: rgba(255,255,255,0.18); }

    /* Mobile padding */
    @media (max-width:767px){ .container{padding-left:12px; padding-right:12px;} }

    .form-title {
      color: #333;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .form-subtitle {
      color: #666;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>
  <nav class="navbar topbar">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-bank2 me-2"></i> Bank Loan Approval</a>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card p-5 mb-3">
          <h2 class="form-title text-center">💳 Loan Eligibility Prediction</h2>
          <p class="form-subtitle text-center">Enter your details to get instant approval prediction</p>

          <form method="post" action="/predict" class="row g-3" id="predictForm">
            
            <div class="col-12">
              <label class="form-label"><i class="bi bi-person me-2"></i>Gender</label>
              <select name="Gender" class="form-select" required>
                <option value="">-- Select Gender --</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-heart me-2"></i>Marital Status</label>
              <select name="Married" class="form-select" required>
                <option value="">-- Select --</option>
                <option value="Yes">Married</option>
                <option value="No">Single</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-book me-2"></i>Education</label>
              <select name="Education" class="form-select" required>
                <option value="">-- Select --</option>
                <option value="Graduate">Graduate</option>
                <option value="Not Graduate">Not Graduate</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label"><i class="bi bi-briefcase me-2"></i>Self Employed</label>
              <select name="Self_Employed" class="form-select" required>
                <option value="">-- Select --</option>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label"><i class="bi bi-cash-coin me-2"></i>Applicant Income</label>
              <input name="ApplicantIncome" type="number" class="form-control" placeholder="e.g. 50000" required>
            </div>

            <div class="col-md-4">
              <label class="form-label"><i class="bi bi-people me-2"></i>Coapplicant Income</label>
              <input name="CoapplicantIncome" type="number" class="form-control" placeholder="e.g. 0" required>
            </div>

            <div class="col-md-4">
              <label class="form-label"><i class="bi bi-cash me-2"></i>Loan Amount</label>
              <input name="LoanAmount" type="number" class="form-control" placeholder="e.g. 128" required>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-calendar me-2"></i>Loan Term (months)</label>
              <input name="Loan_Amount_Term" type="number" class="form-control" placeholder="e.g. 360" required>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-graph-up me-2"></i>Credit History</label>
              <select name="Credit_History" class="form-select" required>
                <option value="">-- Select --</option>
                <option value="1">Good (1)</option>
                <option value="0">Bad/No History (0)</option>
              </select>
            </div>

            <div class="col-12 text-center pt-3">
              <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                <i class="bi bi-lightning-charge me-2"></i> Predict Loan Approval
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
