<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loan Eligibility - Input</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Header/Navbar */
    .header {
      text-align: center;
      color: white;
      padding: 20px 0;
      margin-bottom: 20px;
    }

    .header .title {
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Main Card */
    .card-container {
      background: rgba(7, 16, 51, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-title {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 30px;
      text-align: center;
    }

    /* Form Grid */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    .form-input, .form-select {
      background: white;
      color: #333;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.3s;
      outline: none;
    }

    .form-input::placeholder {
      color: #999;
    }

    .form-input:focus, .form-select:focus {
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      transform: translateY(-2px);
    }

    .form-select {
      cursor: pointer;
    }

    .form-select option {
      color: #333;
      background: white;
    }

    /* Button */
    .predict-btn {
      width: 100%;
      padding: 14px 30px;
      background: linear-gradient(90deg, #00d4ff, #0099ff);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
    }

    .predict-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 212, 255, 0.5);
    }

    .predict-btn:active {
      transform: translateY(-1px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .card-container {
        padding: 25px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .card-title {
        font-size: 1.3rem;
      }

      .header .title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="title">🏦 Bank Loan Approval</div>
  </div>

  <div class="card-container">
    <div class="card-title">Enter Applicant Details</div>

    <form method="POST" action="/predict">
      
      <div class="form-grid">
        <div class="form-group">
          <label for="Gender">Gender</label>
          <select name="Gender" id="Gender" class="form-select" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Married">Married</label>
          <select name="Married" id="Married" class="form-select" required>
            <option value="">Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Education">Education</label>
          <select name="Education" id="Education" class="form-select" required>
            <option value="">Select</option>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Self_Employed">Self Employed</label>
          <select name="Self_Employed" id="Self_Employed" class="form-select" required>
            <option value="">Select</option>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="ApplicantIncome">Applicant Income</label>
          <input type="number" name="ApplicantIncome" id="ApplicantIncome" class="form-input" placeholder="e.g. 5000" required>
        </div>

        <div class="form-group">
          <label for="CoapplicantIncome">Coapplicant Income</label>
          <input type="number" name="CoapplicantIncome" id="CoapplicantIncome" class="form-input" placeholder="e.g. 0" required>
        </div>

        <div class="form-group">
          <label for="LoanAmount">Loan Amount</label>
          <input type="number" name="LoanAmount" id="LoanAmount" class="form-input" placeholder="e.g. 128" required>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="Loan_Amount_Term">Loan Term (months)</label>
          <input type="number" name="Loan_Amount_Term" id="Loan_Amount_Term" class="form-input" placeholder="e.g. 360" required>
        </div>

        <div class="form-group">
          <label for="Credit_History">Credit History</label>
          <select name="Credit_History" id="Credit_History" class="form-select" required>
            <option value="">Select</option>
            <option value="1">Good</option>
            <option value="0">Bad</option>
          </select>
        </div>
      </div>

      <button type="submit" class="predict-btn">Predict</button>
    </form>
  </div>
</body>

</html>
