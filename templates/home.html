<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loan Eligibility - Input</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* Page */
    :root{
      --bg-dark-1: #051028;
      --bg-dark-2: #071033;
      --card-bg: rgba(255,255,255,0.06);
      --input-bg: #ffffff;
      --input-text: #052034;
      --muted-white: rgba(255,255,255,0.9);
      --accent: linear-gradient(90deg,#06b6d4,#4f46e5);
    }
    html,body{height:100%}
    body{
      margin:0;
      min-height:100%;
      background: linear-gradient(180deg,var(--bg-dark-1),var(--bg-dark-2));
      color:var(--muted-white);
      font-family: system-ui, -apple-system, Roboto, Arial, sans-serif;
      padding-top:72px;
    }

    /* Topbar */
    .topbar{
      position:fixed; top:0; left:0; right:0; z-index:1030;
      background: rgba(2,6,23,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      backdrop-filter: blur(4px);
    }
    .navbar-brand{ color:#fff !important; font-weight:700; }

    /* Card */
    .card{
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius:12px;
      color:var(--muted-white);
    }

    /* Form labels and helpers */
    label, .form-label { color: #ffffff !important; font-weight:600; }
    .muted { color: rgba(255,255,255,0.85); }

    /* Inputs: strong contrast */
    .form-control, .form-select {
      background: var(--input-bg) !important;
      color: var(--input-text) !important;
      border: 1px solid rgba(0,0,0,0.08);
      height:44px;
      box-shadow: none;
    }
    .form-control::placeholder { color: rgba(5,32,52,0.45) !important; }

    /* selects options readably */
    .form-select option { color: var(--input-text); background: var(--input-bg); }

    /* Focus */
    .form-control:focus, .form-select:focus {
      outline: none;
      border-color: rgba(79,70,229,0.7);
      box-shadow: 0 6px 20px rgba(79,70,229,0.06);
    }

    /* Buttons */
    .btn-primary {
      background: var(--accent);
      border: none;
      color: #fff;
      box-shadow: 0 8px 22px rgba(79,70,229,0.12);
    }

    /* Result */
    .result-badge { font-size:1.05rem; padding:.45rem .9rem; border-radius:10px; display:inline-flex; gap:.5rem; align-items:center; }
    .approved { background: linear-gradient(90deg,#16a34a,#4ade80); color:#04220b; }
    .rejected { background: linear-gradient(90deg,#dc2626,#f97316); color:#3a0b00; }

    /* Progress bars */
    .prob-bar { height:16px; border-radius:8px; }
    .approve-bar { background: linear-gradient(90deg,#10b981,#34d399); }
    .reject-bar { background: linear-gradient(90deg,#ef4444,#fb923c); }
    .progress { background: rgba(255,255,255,0.18); }

    /* Mobile padding */
    @media (max-width:767px){ .container{padding-left:12px; padding-right:12px;} }
  </style>
</head>

<body>
  <nav class="navbar topbar">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-bank2 me-2"></i> Bank Loan Approval</a>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card p-4 mb-3">
          <h4 class="mb-3">Enter Applicant Details</h4>

          <form method="post" action="/predict" class="row g-3">
            <div class="col-12">
              <label class="form-label">Bank Name</label>
              <select name="Bank_Name" class="form-select" required>
                <option value="" selected disabled>Select bank</option>
                <option value="SBI bank">SBI Bank</option>
                <option value="AXIS bank">AXIS Bank</option>
                <option value="HDFC bank">HDFC Bank</option>
                <option value="Others">Others</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Gender</label>
              <select name="Gender" class="form-select" required>
                <option value="1">Male</option><option value="0">Female</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Married</label>
              <select name="Married" class="form-select" required>
                <option value="1">Yes</option><option value="0">No</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Education</label>
              <select name="Education" class="form-select" required>
                <option value="1">Graduate</option><option value="0">Not Graduate</option>
              </select>
            </div>

            <div class="col-md-3">
              <label class="form-label">Self Employed</label>
              <select name="Self_Employed" class="form-select" required>
                <option value="0">No</option><option value="1">Yes</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Applicant Income</label>
              <input name="ApplicantIncome" type="number" class="form-control" placeholder="e.g. 5000" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Coapplicant Income</label>
              <input name="CoapplicantIncome" type="number" class="form-control" placeholder="e.g. 0" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Loan Amount</label>
              <input name="LoanAmount" type="number" class="form-control" placeholder="e.g. 128" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Loan Term (months)</label>
              <input name="Loan_Amount_Term" type="number" class="form-control" placeholder="e.g. 360" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Credit History</label>
              <select name="Credit_History" class="form-select" required>
                <option value="1">Good</option><option value="0">Bad</option>
              </select>
            </div>

            <div class="col-12 text-end">
              <button type="submit" class="btn btn-primary btn-lg">Predict</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Use your Render backend
    const BACKEND_URL = "https://bank-lone-approval-1.onrender.com/predict";

    function toFloatSafe(v){ const n = parseFloat(v); return isNaN(n) ? 0.0 : n; }

    document.getElementById('predictForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerText = 'Predicting...';

      const payload = {
        Bank_Name: document.getElementById('Bank_Name').value,
        Gender: document.getElementById('Gender').value,
        Married: document.getElementById('Married').value,
        Education: document.getElementById('Education').value,
        Self_Employed: document.getElementById('Self_Employed').value,
        ApplicantIncome: toFloatSafe(document.getElementById('ApplicantIncome').value),
        CoapplicantIncome: toFloatSafe(document.getElementById('CoapplicantIncome').value),
        LoanAmount: toFloatSafe(document.getElementById('LoanAmount').value),
        Loan_Amount_Term: toFloatSafe(document.getElementById('Loan_Amount_Term').value),
        Credit_History: document.getElementById('Credit_History').value
      };

      try {
        const res = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: {'Content-Type':'application/json', 'Accept':'application/json'},
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();

        const label = data?.result?.label ?? (data?.prediction === 1 ? 'Approved' : 'Rejected');
        const probs = data?.result?.probabilities ?? null;

        const resultCard = document.getElementById('resultCard');
        const resultLabel = document.getElementById('resultLabel');
        resultLabel.textContent = label;
        resultLabel.className = 'result-badge ' + (String(label).toLowerCase().includes('approve') ? 'approved' : 'rejected');

        if (probs && typeof probs.approve !== 'undefined'){
          const pA = Math.round(probs.approve * 100);
          const pR = Math.round((probs.reject ?? (1 - probs.approve)) * 100);
          document.getElementById('pApproveText').textContent = pA + '%';
          document.getElementById('pRejectText').textContent = pR + '%';
          document.getElementById('pApproveBar').style.width = pA + '%';
          document.getElementById('pRejectBar').style.width = pR + '%';
        } else {
          document.getElementById('pApproveText').textContent = 'N/A';
          document.getElementById('pRejectText').textContent = 'N/A';
          document.getElementById('pApproveBar').style.width = '0%';
          document.getElementById('pRejectBar').style.width = '0%';
        }

        resultCard.style.display = 'block';
        resultCard.scrollIntoView({behavior:'smooth'});
      } catch (err){
        alert('Prediction failed: ' + err.message);
      } finally {
        btn.disabled = false; btn.innerHTML = '<i class="bi bi-lightning-charge me-2"></i> Predict';
      }
    });

    document.getElementById('tryAgain').addEventListener('click', (e)=>{
      e.preventDefault();
      document.getElementById('predictForm').reset();
      document.getElementById('resultCard').style.display = 'none';
      window.scrollTo({top:0, behavior:'smooth'});
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<!-- web: gunicorn app:app --bind 0.0.0.0:$PORT -->
