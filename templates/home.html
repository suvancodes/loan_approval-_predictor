<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bank Loan Approval | Input</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root{
      --bg-1:#0a1026;
      --bg-2:#0f1a40;
      --card:#1b254a;
      --line:rgba(255,255,255,.12);
      --text:#e9eefc;
      --muted:#b7c1e6;
      --primary:#4f7cff;
      --primary-2:#2dd4ff;
    }

    body{
      min-height:100vh;
      margin:0;
      color:var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 500px at 20% -10%, #2c4bd7 0%, transparent 50%),
        radial-gradient(900px 400px at 100% 0%, #00a6ff33 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
    }

    .topbar{
      background: rgba(8,12,30,.75);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .brand{
      color:#fff;
      font-weight:700;
      letter-spacing:.2px;
      text-decoration:none;
    }

    .main-wrap{
      padding: 48px 16px;
    }

    .form-card{
      max-width: 920px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
    }

    .title{
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle{
      color: var(--muted);
      margin-bottom: 20px;
    }

    .form-label{
      color:#f4f7ff;
      font-weight:600;
      margin-bottom: 6px;
    }

    .form-control, .form-select{
      height:44px;
      border-radius:10px;
      border:1px solid #d8e0ff22;
      background:#f9fbff;
      color:#0d1b3e;
    }

    .form-control:focus, .form-select:focus{
      border-color:#7ca0ff;
      box-shadow: 0 0 0 .2rem rgba(79,124,255,.2);
    }

    .btn-predict{
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
      border: 0;
      color: white;
      font-weight: 700;
      border-radius: 10px;
      padding: 11px 22px;
    }

    .btn-predict:hover{
      filter: brightness(1.05);
    }

    @media (max-width: 768px){
      .form-card{ padding: 20px; }
      .title{ font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar topbar">
    <div class="container">
      <a class="brand" href="/"><i class="bi bi-bank2 me-2"></i>Bank Loan Approval</a>
    </div>
  </nav>

  <main class="main-wrap">
    <section class="form-card">
      <h1 class="title">Enter Applicant Details</h1>
      <p class="subtitle">Provide accurate values for better prediction quality.</p>

      <form method="POST" action="/predict" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Gender</label>
          <select name="Gender" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Married</label>
          <select name="Married" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Education</label>
          <select name="Education" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Self Employed</label>
          <select name="Self_Employed" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Applicant Income</label>
          <input name="ApplicantIncome" type="number" class="form-control" placeholder="e.g. 5000" required />
        </div>

        <div class="col-md-4">
          <label class="form-label">Coapplicant Income</label>
          <input name="CoapplicantIncome" type="number" class="form-control" placeholder="e.g. 0" required />
        </div>

        <div class="col-md-4">
          <label class="form-label">Loan Amount</label>
          <input name="LoanAmount" type="number" class="form-control" placeholder="e.g. 128" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Loan Term (months)</label>
          <input name="Loan_Amount_Term" type="number" class="form-control" placeholder="e.g. 360" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Credit History</label>
          <select name="Credit_History" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="1">Good</option>
            <option value="0">Bad</option>
          </select>
        </div>

        <div class="col-12 text-end mt-2">
          <button type="submit" class="btn btn-predict">
            <i class="bi bi-lightning-charge-fill me-1"></i> Predict
          </button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
