<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Loan Approval Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: white !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .container-main {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            margin: 50px auto;
            backdrop-filter: blur(10px);
        }

        .form-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .form-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1rem;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background-color: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background-color: white;
        }

        input[type="number"] {
            font-size: 1rem;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .info-box {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: #333;
            font-size: 0.95rem;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <span class="navbar-brand">🏦 Bank Loan Approval</span>
        </div>
    </nav>

    <div class="container-main">
        <h1 class="form-title">Loan Prediction</h1>
        <p class="form-subtitle">Enter your details to get instant approval prediction</p>

        <div class="info-box">
            ℹ️ <strong>Fill all fields accurately</strong> for the best prediction results
        </div>

        <form method="POST" action="/predict">

            <div class="form-group">
                <label for="Gender">👤 Gender:</label>
                <select name="Gender" id="Gender" required>
                    <option value="">-- Select Gender --</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="Married">💍 Marital Status:</label>
                <select name="Married" id="Married" required>
                    <option value="">-- Select Status --</option>
                    <option value="Yes">Married</option>
                    <option value="No">Single</option>
                </select>
            </div>

            <div class="form-group">
                <label for="Education">🎓 Education:</label>
                <select name="Education" id="Education" required>
                    <option value="">-- Select Education --</option>
                    <option value="Graduate">Graduate</option>
                    <option value="Not Graduate">Not Graduate</option>
                </select>
            </div>

            <div class="form-group">
                <label for="Self_Employed">🏢 Self Employed:</label>
                <select name="Self_Employed" id="Self_Employed" required>
                    <option value="">-- Select --</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <label for="ApplicantIncome">💰 Applicant Income:</label>
                <input type="number" name="ApplicantIncome" id="ApplicantIncome" placeholder="e.g., 50000" required>
            </div>

            <div class="form-group">
                <label for="CoapplicantIncome">👥 Coapplicant Income:</label>
                <input type="number" name="CoapplicantIncome" id="CoapplicantIncome" placeholder="e.g., 5000" required>
            </div>

            <div class="form-group">
                <label for="LoanAmount">💵 Loan Amount (in thousands):</label>
                <input type="number" name="LoanAmount" id="LoanAmount" placeholder="e.g., 200" required>
            </div>

            <div class="form-group">
                <label for="Loan_Amount_Term">📅 Loan Term (in months):</label>
                <input type="number" name="Loan_Amount_Term" id="Loan_Amount_Term" placeholder="e.g., 360" required>
            </div>

            <div class="form-group">
                <label for="Credit_History">📊 Credit History:</label>
                <select name="Credit_History" id="Credit_History" required>
                    <option value="">-- Select --</option>
                    <option value="1">Good (1)</option>
                    <option value="0">Bad/No History (0)</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">🚀 Predict Loan Approval</button>
        </form>
    </div>
</body>
</html>
