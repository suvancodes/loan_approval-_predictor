<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bank Loan Approval | Input</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    :root{
      --bg:#081126;
      --bg2:#0b1633;
      --card:#1a2340;
      --card2:#202a4d;
      --text:#eef2ff;
      --muted:#b6c2e2;
      --accent1:#29d3ff;
      --accent2:#5b6cff;
      --line:rgba(255,255,255,.08);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(41,211,255,.18), transparent 45%),
        radial-gradient(800px 450px at 100% 0%, rgba(91,108,255,.18), transparent 40%),
        linear-gradient(160deg, var(--bg), var(--bg2));
    }

    .topbar{
      background: rgba(5,10,24,.88);
      border-bottom: 1px solid rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
      min-height: 68px;
    }

    .brand{
      color:#fff;
      text-decoration:none;
      font-weight:800;
      letter-spacing:.2px;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 16px 56px;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .hero h1{
      font-size: 1.9rem;
      font-weight: 800;
      margin:0 0 6px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
    }

    .card-panel{
      background: linear-gradient(180deg, rgba(28,39,73,.96), rgba(20,29,57,.96));
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      padding: 28px;
    }

    .section-title{
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .form-label{
      color:#fff;
      font-weight:700;
      margin-bottom: 6px;
    }

    .form-control, .form-select{
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background: #f8fbff;
      color:#14203b;
      box-shadow:none;
    }

    .form-control::placeholder{ color:#8b95a8; }
    .form-control:focus, .form-select:focus{
      border-color: rgba(41,211,255,.7);
      box-shadow: 0 0 0 .2rem rgba(41,211,255,.12);
    }

    .hint{
      color:var(--muted);
      font-size:.95rem;
      margin-bottom: 16px;
    }

    .btn-predict{
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border: none;
      color:#fff;
      font-weight:800;
      border-radius: 12px;
      padding: 12px 22px;
      box-shadow: 0 10px 28px rgba(41,211,255,.25);
    }

    .btn-predict:hover{
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    @media (max-width: 768px){
      .wrap{ padding-top: 20px; }
      .card-panel{ padding: 18px; }
      .hero h1{ font-size: 1.5rem; }
    }
  </style>
</head>

<body>
  <nav class="navbar topbar">
    <div class="container">
      <a class="brand" href="/">
        <i class="bi bi-bank2 me-2"></i>Bank Loan Approval
      </a>
    </div>
  </nav>

  <main class="wrap">
    <div class="hero">
      <div>
        <h1>Loan Eligibility Prediction</h1>
        <p>Enter applicant details and get an instant approval result.</p>
      </div>
    </div>

    <section class="card-panel">
      <div class="section-title">Enter Applicant Details</div>
      <div class="hint">Use accurate values for a better prediction.</div>

      <form method="POST" action="/predict" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Gender</label>
          <select name="Gender" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Married</label>
          <select name="Married" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Education</label>
          <select name="Education" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Self Employed</label>
          <select name="Self_Employed" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label">Applicant Income</label>
          <input name="ApplicantIncome" type="number" class="form-control" placeholder="e.g. 5000" required />
        </div>

        <div class="col-md-4">
          <label class="form-label">Coapplicant Income</label>
          <input name="CoapplicantIncome" type="number" class="form-control" placeholder="e.g. 0" required />
        </div>

        <div class="col-md-4">
          <label class="form-label">Loan Amount</label>
          <input name="LoanAmount" type="number" class="form-control" placeholder="e.g. 128" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Loan Term (months)</label>
          <input name="Loan_Amount_Term" type="number" class="form-control" placeholder="e.g. 360" required />
        </div>

        <div class="col-md-6">
          <label class="form-label">Credit History</label>
          <select name="Credit_History" class="form-select" required>
            <option value="" selected disabled>Select</option>
            <option value="1">Good</option>
            <option value="0">Bad</option>
          </select>
        </div>

        <div class="col-12 text-end pt-2">
          <button type="submit" class="btn btn-predict">
            <i class="bi bi-lightning-charge-fill me-1"></i> Predict
          </button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
