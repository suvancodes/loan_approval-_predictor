<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#0f172a,#020617);
  color:#fff;
  font-family: 'Poppins', sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  animation: fadeIn 0.6s ease-in-out;
}

.result-badge{
  font-size:2rem;
  padding:1rem 2rem;
  border-radius:20px;
  font-weight:600;
  display:inline-block;
  margin-top:10px;
}

.approved{
  background: linear-gradient(135deg,#22c55e,#4ade80);
  color:#022c22;
  box-shadow:0 0 20px rgba(34,197,94,0.5);
}

.rejected{
  background: linear-gradient(135deg,#ef4444,#f97316);
  color:#3b0a0a;
  box-shadow:0 0 20px rgba(239,68,68,0.5);
}

.btn-custom{
  border-radius:12px;
  padding:10px 20px;
  font-weight:500;
  transition:0.3s;
}

.btn-custom:hover{
  transform:translateY(-2px);
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(20px);}
  to{ opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card p-5 text-center">

        <h2 class="mb-3">💳 Loan Prediction Result</h2>
        <p class="text-secondary">Based on your input data</p>

        {% if prediction == 'Y' or prediction == 1 or prediction == '1' %}
          <div class="result-badge approved">✅ Approved</div>
          <p class="mt-3 text-success">Congratulations! Your loan is likely to be approved.</p>
        {% else %}
          <div class="result-badge rejected">❌ Rejected</div>
          <p class="mt-3 text-danger">Sorry! Your loan may not be approved.</p>
        {% endif %}

        <div class="mt-4">
          <a href="/home" class="btn btn-primary btn-custom me-2">🔄 Try Again</a>
          <a href="/" class="btn btn-outline-light btn-custom">🏠 Home</a>
        </div>

      </div>

    </div>
  </div>
</div>

</body>
</html>
